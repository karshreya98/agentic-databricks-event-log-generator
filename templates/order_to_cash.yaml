# Order-to-Cash (O2C) Event Log Template
#
# Maps common sales/fulfillment tables to a process event log.
# Adapt table and column names to your environment.

event_log:
  name: order_to_cash
  output_table: process_mining.silver.o2c_event_log

  sources:
    # Sales Orders
    - table: erp.sales.orders
      case_id: order_id
      events:
        - activity: "Create Sales Order"
          timestamp: created_at
          resource: sales_rep
          cost: order_value
        - activity: "Approve Sales Order"
          timestamp: approved_at
          condition: "approved_at IS NOT NULL"
          resource: approver

    # Credit Check
    - table: finance.credit.checks
      case_id: order_id
      events:
        - activity: "Run Credit Check"
          timestamp: check_date
          resource: analyst
        - activity: "Approve Credit"
          timestamp: approved_date
          condition: "result = 'approved'"
        - activity: "Reject Credit"
          timestamp: approved_date
          condition: "result = 'rejected'"

    # Fulfillment
    - table: erp.warehouse.shipments
      case_id: order_id
      events:
        - activity: "Pick Items"
          timestamp: pick_date
          resource: picker
        - activity: "Pack Items"
          timestamp: pack_date
        - activity: "Ship Order"
          timestamp: ship_date

    # Invoicing
    - table: finance.accounts_receivable.invoices
      case_id: order_id
      events:
        - activity: "Generate Invoice"
          timestamp: invoice_date
          cost: invoice_amount
        - activity: "Send Invoice"
          timestamp: sent_date
          condition: "sent_date IS NOT NULL"

    # Payment
    - table: finance.accounts_receivable.payments
      case_id: order_id
      events:
        - activity: "Receive Payment"
          timestamp: payment_date
          cost: payment_amount

  standardization:
    activity_overrides:
      "SO Created": "Create Sales Order"
      "Credit OK": "Approve Credit"
      "Inv Generated": "Generate Invoice"

  enrichment:
    - table: erp.sales.customers
      join_key: customer_id
      columns:
        - customer_segment
        - lifetime_value
        - region
        - payment_history_score
    - table: erp.warehouse.inventory
      join_key: product_id
      columns:
        - stock_level
        - warehouse_location
        - avg_fulfillment_days
