# Procure-to-Pay (P2P) Event Log Template
#
# Maps common procurement source tables to a process event log.
# Adapt the table names and column names to match your environment.
#
# Usage:
#   from eventlog import EventLogBuilder
#   builder = EventLogBuilder(spark, "templates/procure_to_pay.yaml")
#   builder.save()

event_log:
  name: procure_to_pay
  output_table: process_mining.silver.p2p_event_log

  sources:
    # Purchase Requisitions
    - table: erp.procurement.purchase_requisitions
      case_id: requisition_id
      events:
        - activity: "Create Purchase Requisition"
          timestamp: created_at
          resource: created_by
        - activity: "Approve Purchase Requisition"
          timestamp: approved_at
          condition: "approved_at IS NOT NULL"
          resource: approved_by

    # Purchase Orders
    - table: erp.procurement.purchase_orders
      case_id: po_number
      events:
        - activity: "Create Purchase Order"
          timestamp: created_at
          resource: buyer
          cost: po_value
        - activity: "Approve Purchase Order"
          timestamp: approved_at
          condition: "approved_at IS NOT NULL"
          resource: approver

    # Goods Receipts
    - table: erp.warehouse.goods_receipts
      case_id: po_number
      events:
        - activity: "Post Goods Receipt"
          timestamp: posting_date
          resource: receiver

    # Invoices
    - table: finance.accounts_payable.invoices
      case_id: po_number
      events:
        - activity: "Receive Invoice"
          timestamp: received_date
        - activity: "Clear Invoice"
          timestamp: cleared_date
          condition: "cleared_date IS NOT NULL"

    # Payments
    - table: finance.accounts_payable.payments
      case_id: po_number
      events:
        - activity: "Process Payment"
          timestamp: payment_date
          cost: payment_amount

  standardization:
    activity_overrides:
      # Map any raw values from source systems to canonical names
      "PR Created": "Create Purchase Requisition"
      "PO Created": "Create Purchase Order"
      "GR Posted": "Post Goods Receipt"
      "Inv Received": "Receive Invoice"

  enrichment:
    - table: erp.procurement.supplier_master
      join_key: supplier_id
      columns:
        - credit_risk_rating
        - on_time_delivery_rate
        - years_as_supplier
        - country
    - table: erp.procurement.contracts
      join_key: contract_id
      columns:
        - amendment_count
        - payment_terms_days
        - contract_type
