# IT Incident Management Event Log Template
#
# Maps ServiceNow-style incident tables to a process event log.
# Adapt table and column names to your environment.

event_log:
  name: incident_management
  output_table: process_mining.silver.incident_event_log

  sources:
    # Incident lifecycle events
    - table: itsm.servicenow.incidents
      case_id: incident_id
      events:
        - activity: "Create Incident"
          timestamp: opened_at
          resource: opened_by
        - activity: "Assign Incident"
          timestamp: assigned_at
          condition: "assigned_at IS NOT NULL"
          resource: assigned_to
        - activity: "Begin Investigation"
          timestamp: work_start
          condition: "work_start IS NOT NULL"
          resource: assigned_to
        - activity: "Resolve Incident"
          timestamp: resolved_at
          condition: "resolved_at IS NOT NULL"
          resource: resolved_by
        - activity: "Close Incident"
          timestamp: closed_at
          condition: "closed_at IS NOT NULL"

    # Escalation events
    - table: itsm.servicenow.incident_escalations
      case_id: incident_id
      events:
        - activity: "Escalate Incident"
          timestamp: escalated_at
          resource: escalated_by

    # Reassignment events
    - table: itsm.servicenow.incident_reassignments
      case_id: incident_id
      events:
        - activity: "Reassign Incident"
          timestamp: reassigned_at
          resource: new_assignee

    # Comments / worknotes (optional — can be noisy)
    # - table: itsm.servicenow.incident_worknotes
    #   case_id: incident_id
    #   events:
    #     - activity: "Add Work Note"
    #       timestamp: created_at
    #       resource: author

  standardization:
    activity_overrides:
      "Ticket Created": "Create Incident"
      "Ticket Assigned": "Assign Incident"
      "Ticket Resolved": "Resolve Incident"
      "Ticket Closed": "Close Incident"

  enrichment:
    - table: itsm.servicenow.cmdb_ci
      join_key: ci_id
      columns:
        - ci_name
        - ci_class
        - environment
        - business_criticality
    - table: hr.employees
      join_key: assigned_to
      columns:
        - team
        - location
        - experience_years
